name: PHP

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  analyse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gmp, sqlite3

      - name: Install dependencies
        if: hashFiles('composer.json') != ''
        run: composer install --no-interaction --prefer-dist

      - name: Syntax check
        run: |
          php -l Subnet-Calculator/index.php
          for f in Subnet-Calculator/includes/*.php Subnet-Calculator/templates/layout.php; do
            php -l "$f"
          done
          if [ -d Subnet-Calculator/api ]; then
            find Subnet-Calculator/api -name '*.php' | while read f; do php -l "$f"; done
          fi

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit
        if: hashFiles('composer.json') != ''
        run: vendor/bin/phpunit

      - name: Spectral — lint OpenAPI spec
        if: hashFiles('Subnet-Calculator/api/openapi.yaml') != ''
        run: npx --yes @stoplight/spectral-cli@6 lint Subnet-Calculator/api/openapi.yaml
