openapi: 3.1.0
info:
  title: Subnet Calculator API
  version: "1.0"
  description: |
    JSON REST API for IPv4/IPv6 subnet calculation, VLSM allocation,
    overlap detection, subnet splitting, route summarisation, ULA prefix
    generation, and VLSM session persistence.
  license:
    name: AGPL-3.0
    identifier: AGPL-3.0-only
  contact:
    name: Sean Mousseau
    url: https://github.com/seanmousseau/Subnet-Calculator

servers:
  - url: /api/v1
    description: |
      Relative to the app installation root.
      Operators may restrict available endpoints via the `$api_allowed_endpoints`
      configuration variable (see `config.php.example`). If an endpoint is disabled,
      requests to it return HTTP 404 even when the server is otherwise reachable.
      The meta endpoint (GET /) always remains accessible regardless of this setting.

security: []   # Override per-operation when $api_tokens is configured

tags:
  - name: Meta
    description: API metadata and discovery
  - name: IPv4
    description: IPv4 subnet calculation
  - name: IPv6
    description: IPv6 subnet calculation
  - name: VLSM
    description: Variable Length Subnet Masking allocation
  - name: Overlap
    description: Subnet overlap detection
  - name: Split
    description: Subnet splitting
  - name: Supernet
    description: Route summarisation and supernet calculation
  - name: ULA
    description: IPv6 Unique Local Address generation
  - name: Sessions
    description: VLSM session persistence
  - name: RDNS
    description: Reverse-DNS zone generation
  - name: Bulk
    description: Batch subnet calculation
  - name: Range
    description: IP address range to CIDR conversion
  - name: Tree
    description: Subnet allocation tree
  - name: Changelog
    description: API changelog

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    OkEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object

    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string

    Ipv4Result:
      type: object
      required:
        - network_cidr
        - broadcast
        - netmask
        - netmask_cidr
        - wildcard
        - host_min
        - host_max
        - usable_hosts
        - total_ips
      properties:
        network_cidr:    { type: string,  example: "10.0.0.0/24" }
        broadcast:       { type: string,  example: "10.0.0.255" }
        netmask:         { type: string,  example: "255.255.255.0" }
        netmask_cidr:    { type: string,  example: "/24" }
        wildcard:        { type: string,  example: "0.0.0.255" }
        host_min:        { type: string,  example: "10.0.0.1" }
        host_max:        { type: string,  example: "10.0.0.254" }
        usable_hosts:    { type: integer, example: 254 }
        total_ips:       { type: integer, example: 256 }
        ip_type:         { type: string,  example: "Private" }
        reverse_dns:     { type: string,  example: "0.0.10.in-addr.arpa" }
        network_hex:     { type: string,  example: "0A.00.00.00", description: "Network address in dotted-hex notation (e.g. C0.A8.01.00)" }
        network_decimal: { type: integer, example: 167772160,    description: "Network address as unsigned 32-bit decimal integer" }

    Ipv6Result:
      type: object
      required: [network_cidr, prefix, first_addr, last_addr]
      properties:
        network_cidr:       { type: string, example: "2001:db8::/32" }
        prefix:             { type: string, example: "/32" }
        first_addr:         { type: string, example: "2001:db8::" }
        last_addr:          { type: string, example: "2001:db8:ffff:ffff:ffff:ffff:ffff:ffff" }
        total_addresses:    { type: string, example: "79228162514264337593543950336" }
        address_expanded:   { type: string, example: "2001:0db8:0000:0000:0000:0000:0000:0000", description: "Full 128-bit address in 8 colon-separated 4-hex groups" }
        address_compressed: { type: string, example: "2001:db8::", description: "Address in compressed RFC 5952 notation" }

    VlsmAllocation:
      type: object
      required: [name, hosts_needed, subnet, host_min, host_max, usable, waste]
      properties:
        name:         { type: string, example: "LAN" }
        hosts_needed: { type: integer, example: 50 }
        subnet:       { type: string, example: "10.0.0.0/26" }
        host_min:     { type: string, example: "10.0.0.1" }
        host_max:     { type: string, example: "10.0.0.62" }
        usable:       { type: integer, example: 62 }
        waste:        { type: integer, example: 12 }

    SplitResult:
      type: object
      required: [network, split_prefix, total, showing, subnets]
      properties:
        network:       { type: string, example: "10.0.0.0/24" }
        split_prefix:  { type: string, example: "/26" }
        total:
          oneOf:
            - type: integer
            - type: string
          description: Total subnets; string like "2^N" when too large to count.
          example: 4
        showing:       { type: integer, example: 4 }
        subnets:
          type: array
          items: { type: string }

    UlaResult:
      type: object
      required: [prefix, global_id, example_64s, available_64s]
      properties:
        prefix:        { type: string, example: "fd1a:2b3c:4d5e::/48" }
        global_id:     { type: string, example: "1a2b3c4d5e" }
        example_64s:
          type: array
          items: { type: string }
          example: ["fd1a:2b3c:4d5e:0000::/64", "fd1a:2b3c:4d5e:0001::/64"]
        available_64s: { type: integer, example: 65536 }

paths:
  /:
    get:
      operationId: meta
      tags: [Meta]
      summary: API metadata
      description: Returns API version and list of available endpoints.
      responses:
        "200":
          description: Metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          version:   { type: string }
                          endpoints: { type: array, items: { type: string } }
              example:
                ok: true
                data:
                  version: "1"
                  endpoints:
                    - ipv4
                    - ipv6
                    - vlsm
                    - overlap
                    - split/ipv4
                    - split/ipv6
                    - supernet
                    - ula
                    - rdns
                    - bulk
                    - range/ipv4
                    - tree
                    - sessions
                    - changelog

  /ipv4:
    post:
      operationId: calcIpv4
      tags: [IPv4]
      summary: IPv4 subnet calculation
      description: >
        Calculate IPv4 subnet details including network address, broadcast,
        netmask, wildcard mask, host range, usable host count, address type,
        and reverse-DNS zone from an IP address and optional prefix or mask.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip:   { type: string, description: "IP address (with or without prefix)", example: "10.0.0.1" }
                mask: { type: string, description: "Prefix length or dotted-decimal mask", example: "24" }
      responses:
        "200":
          description: Subnet details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Ipv4Result" }
              example:
                ok: true
                data:
                  network_cidr: "10.0.0.0/24"
                  broadcast: "10.0.0.255"
                  netmask: "255.255.255.0"
                  netmask_cidr: "/24"
                  wildcard: "0.0.0.255"
                  host_min: "10.0.0.1"
                  host_max: "10.0.0.254"
                  usable_hosts: 254
                  total_ips: 256
                  ip_type: "Private"
                  reverse_dns: "0.0.10.in-addr.arpa"
                  network_hex: "0A.00.00.00"
                  network_decimal: 167772160
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /ipv6:
    post:
      operationId: calcIpv6
      tags: [IPv6]
      summary: IPv6 subnet calculation
      description: >
        Calculate IPv6 prefix details including network CIDR, first and last
        address, total address count, expanded and compressed address forms,
        and address type. Requires the PHP GMP extension on the server.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ipv6]
              properties:
                ipv6:   { type: string, example: "2001:db8::1" }
                prefix: { type: string, example: "32" }
      responses:
        "200":
          description: Subnet details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Ipv6Result" }
              example:
                ok: true
                data:
                  network_cidr: "2001:db8::/32"
                  prefix: "/32"
                  first_addr: "2001:db8::"
                  last_addr: "2001:db8:ffff:ffff:ffff:ffff:ffff:ffff"
                  total_addresses: "79228162514264337593543950336"
                  address_expanded: "2001:0db8:0000:0000:0000:0000:0000:0000"
                  address_compressed: "2001:db8::"
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /vlsm:
    post:
      operationId: calcVlsm
      tags: [VLSM]
      summary: VLSM subnet allocation
      description: >
        Allocates subnets from a parent network using Variable Length Subnet
        Masking. Requirements are sorted largest-first and packed greedily;
        the response includes each allocation's subnet, host range, usable
        count, and wasted addresses.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [network, requirements]
              properties:
                network:
                  type: string
                  example: "10.0.0.0"
                cidr:
                  type: string
                  example: "24"
                requirements:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [name, hosts]
                    properties:
                      name:  { type: string, example: "LAN" }
                      hosts: { type: integer, minimum: 1, example: 50 }
      responses:
        "200":
          description: VLSM allocations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          allocations:
                            type: array
                            items: { $ref: "#/components/schemas/VlsmAllocation" }
              example:
                ok: true
                data:
                  allocations:
                    - name: "LAN"
                      hosts_needed: 50
                      subnet: "10.0.0.0/26"
                      host_min: "10.0.0.1"
                      host_max: "10.0.0.62"
                      usable: 62
                      waste: 12
                    - name: "DMZ"
                      hosts_needed: 14
                      subnet: "10.0.0.64/28"
                      host_min: "10.0.0.65"
                      host_max: "10.0.0.78"
                      usable: 14
                      waste: 0
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /overlap:
    post:
      operationId: checkOverlap
      tags: [Overlap]
      summary: Subnet overlap check (IPv4 or IPv6)
      description: >
        Compares two CIDR blocks and returns their containment relation:
        none, identical, a_contains_b, or b_contains_a. Accepts both IPv4
        and IPv6 prefixes; both inputs must be the same address family.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cidr_a, cidr_b]
              properties:
                cidr_a: { type: string, example: "10.0.0.0/24" }
                cidr_b: { type: string, example: "10.0.0.128/25" }
      responses:
        "200":
          description: Overlap relation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [cidr_a, cidr_b, relation]
                        properties:
                          cidr_a:    { type: string }
                          cidr_b:    { type: string }
                          relation:
                            type: string
                            enum: [none, identical, a_contains_b, b_contains_a]
              example:
                ok: true
                data:
                  cidr_a: "10.0.0.0/24"
                  cidr_b: "10.0.0.128/25"
                  relation: "a_contains_b"
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /split/ipv4:
    post:
      operationId: splitIpv4
      tags: [Split]
      summary: Split an IPv4 subnet into smaller subnets
      description: >
        Divides a parent IPv4 subnet into equal-size child subnets at the
        given prefix length. Results are paginated via the `limit` parameter
        (default 16, max 256).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip, split_prefix]
              properties:
                ip:           { type: string, example: "10.0.0.0" }
                mask:         { type: string, example: "24" }
                split_prefix: { type: integer, minimum: 1, maximum: 32, example: 26 }
                limit:        { type: integer, minimum: 1, maximum: 256, default: 16 }
      responses:
        "200":
          description: Split result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/SplitResult" }
              example:
                ok: true
                data:
                  network: "10.0.0.0/24"
                  split_prefix: "/26"
                  total: 4
                  showing: 4
                  subnets:
                    - "10.0.0.0/26"
                    - "10.0.0.64/26"
                    - "10.0.0.128/26"
                    - "10.0.0.192/26"
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /split/ipv6:
    post:
      operationId: splitIpv6
      tags: [Split]
      summary: Split an IPv6 subnet into smaller subnets
      description: >
        Divides a parent IPv6 prefix into equal-size child prefixes at the
        given prefix length. When the prefix difference is ≥ 63 the total
        count is returned as a string (e.g. "2^65"). Results are paginated
        via `limit` (default 16, max 256).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ipv6, split_prefix]
              properties:
                ipv6:         { type: string, example: "2001:db8::/32" }
                prefix:       { type: string, example: "32" }
                split_prefix: { type: integer, minimum: 1, maximum: 128, example: 48 }
                limit:        { type: integer, minimum: 1, maximum: 256, default: 16 }
      responses:
        "200":
          description: Split result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/SplitResult" }
              example:
                ok: true
                data:
                  network: "2001:db8::/32"
                  split_prefix: "/48"
                  total: 65536
                  showing: 4
                  subnets:
                    - "2001:db8::/48"
                    - "2001:db8:1::/48"
                    - "2001:db8:2::/48"
                    - "2001:db8:3::/48"
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /supernet:
    post:
      operationId: supernet
      tags: [Supernet]
      summary: Find supernet or summarise IPv4 routes
      description: >
        Two modes: `find` returns the tightest supernet covering all input
        CIDRs; `summarise` returns the minimal set of covering prefixes using
        a greedy aggregation algorithm. Accepts IPv4 CIDRs only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cidrs]
              properties:
                action:
                  type: string
                  enum: [find, summarise]
                  default: find
                  description: "`find` returns the smallest enclosing supernet; `summarise` reduces to minimal covering prefixes."
                cidrs:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items: { type: string }
                  example: ["10.0.0.0/24", "10.0.1.0/24"]
      responses:
        "200":
          description: Supernet or summarised routes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - type: object
                            required: [supernet]
                            properties:
                              supernet: { type: string, example: "10.0.0.0/23" }
                          - type: object
                            required: [summaries]
                            properties:
                              summaries:
                                type: array
                                items: { type: string }
              example:
                ok: true
                data:
                  supernet: "10.0.0.0/23"
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /ula:
    post:
      operationId: generateUla
      tags: [ULA]
      summary: Generate an IPv6 ULA /48 prefix (RFC 4193)
      description: >
        Generates a random or deterministic IPv6 Unique Local Address /48
        prefix per RFC 4193. Optionally accepts a 10-hex-char global ID;
        if omitted a cryptographically random one is generated.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                global_id:
                  type: string
                  description: Optional 10 hex-char global ID. Random if omitted.
                  example: "1a2b3c4d5e"
      responses:
        "200":
          description: Generated ULA prefix
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/UlaResult" }
              example:
                ok: true
                data:
                  prefix: "fd1a:2b3c:4d5e::/48"
                  global_id: "1a2b3c4d5e"
                  example_64s:
                    - "fd1a:2b3c:4d5e:0000::/64"
                    - "fd1a:2b3c:4d5e:0001::/64"
                    - "fd1a:2b3c:4d5e:0002::/64"
                    - "fd1a:2b3c:4d5e:0003::/64"
                  available_64s: 65536
        "400": { description: Invalid global_id, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /sessions:
    post:
      operationId: createSession
      tags: [Sessions]
      summary: Save a VLSM session payload
      description: Requires `$session_enabled = true` on the server.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: object
                  description: Arbitrary JSON object to persist (e.g. VLSM state).
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [id]
                        properties:
                          id: { type: string, example: "a1b2c3d4" }
              example:
                ok: true
                data:
                  id: "a1b2c3d4"
        "400": { description: Invalid payload }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "501": { description: Session persistence not enabled on this server }

  /sessions/{id}:
    get:
      operationId: loadSession
      tags: [Sessions]
      summary: Load a saved session by ID
      description: >
        Retrieves a previously saved VLSM session by its 8-hex-char ID.
        Sessions expire after the server-configured TTL (default 30 days).
        Requires `$session_enabled = true` on the server.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-f]{8}$"
          example: a1b2c3d4
      responses:
        "200":
          description: Session payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [id, payload]
                        properties:
                          id:      { type: string }
                          payload: { type: object }
              example:
                ok: true
                data:
                  id: "a1b2c3d4"
                  payload:
                    network: "10.0.0.0"
                    cidr: "24"
                    requirements:
                      - { name: "LAN", hosts: 50 }
                      - { name: "DMZ", hosts: 14 }
        "400": { description: Invalid session ID format }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Session not found or expired }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "501": { description: Session persistence not enabled on this server }

  /rdns:
    post:
      operationId: generateRdns
      tags: [RDNS]
      summary: Generate a reverse-DNS zone file (BIND / RFC 2317)
      description: |
        Generates a BIND-format PTR zone file for the given subnet.
        IPv4 requires /16 or greater (max 65 536 addresses).
        IPv6 requires /112 or greater (max 65 536 addresses).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cidr]
              properties:
                cidr:
                  type: string
                  description: Subnet in CIDR notation (IPv4 or IPv6).
                  example: "192.168.1.0/24"
                ns:
                  type: string
                  description: Primary nameserver FQDN for the SOA and NS records.
                  default: "ns1.example.com."
                  example: "ns1.example.com."
                hostmaster:
                  type: string
                  description: SOA hostmaster address in dot notation.
                  default: "hostmaster.example.com."
                  example: "hostmaster.example.com."
                ttl:
                  type: integer
                  description: Zone TTL in seconds.
                  default: 86400
                  minimum: 60
                  maximum: 2147483647
                serial:
                  type: integer
                  description: SOA serial number. Defaults to YYYYMMDDnn of today.
                  example: 2026041101
                domain:
                  type: string
                  description: Placeholder domain appended to generated PTR target hostnames.
                  default: "example.com"
                  example: "example.com"
      responses:
        "200":
          description: BIND zone file content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [zone, format, ttl, record_count, content]
                        properties:
                          zone:         { type: string, example: "1.168.192.in-addr.arpa" }
                          format:       { type: string, enum: [bind] }
                          ttl:          { type: integer, example: 86400 }
                          record_count: { type: integer, example: 256 }
                          content:      { type: string, description: "Full BIND zone file text." }
              example:
                ok: true
                data:
                  zone: "1.168.192.in-addr.arpa"
                  format: "bind"
                  ttl: 86400
                  record_count: 256
                  content: |
                    $ORIGIN 1.168.192.in-addr.arpa.
                    $TTL 86400
                    @ IN SOA ns1.example.com. hostmaster.example.com. (
                        2026041101 3600 900 604800 300 )
                    @ IN NS ns1.example.com.
                    1 IN PTR 1.1.168.192.example.com.
                    2 IN PTR 2.1.168.192.example.com.
        "400": { description: Invalid input, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "500": { description: GMP extension missing (IPv6 only) }

  /bulk:
    post:
      operationId: bulkCalculate
      tags: [Bulk]
      summary: Calculate multiple subnets in a single request
      description: |
        Accepts up to 50 CIDR inputs and returns a per-item result array.
        Individual failures do not abort the request; each item carries its own ok/error status.
        IPv6 items require the PHP GMP extension.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cidrs]
              properties:
                cidrs:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items: { type: string }
                  example: ["10.0.0.0/24", "2001:db8::/32"]
                type:
                  type: string
                  enum: [auto, ipv4, ipv6]
                  default: auto
                  description: Force all items to a specific IP version. `auto` detects per-item.
      responses:
        "200":
          description: Per-item calculation results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [results]
                        properties:
                          results:
                            type: array
                            items:
                              type: object
                              required: [input, ok]
                              properties:
                                input: { type: string }
                                ok:    { type: boolean }
                                data:  { description: "Present when ok is true. Shape matches /ipv4 or /ipv6 response data." }
                                error: { type: string, description: "Present when ok is false." }
              example:
                ok: true
                data:
                  results:
                    - input: "10.0.0.0/24"
                      ok: true
                      data:
                        network_cidr: "10.0.0.0/24"
                        broadcast: "10.0.0.255"
                        netmask: "255.255.255.0"
                        netmask_cidr: "/24"
                        wildcard: "0.0.0.255"
                        host_min: "10.0.0.1"
                        host_max: "10.0.0.254"
                        usable_hosts: 254
                        total_ips: 256
                        ip_type: "Private"
                    - input: "2001:db8::/32"
                      ok: true
                      data:
                        network_cidr: "2001:db8::/32"
                        prefix: "/32"
                        first_addr: "2001:db8::"
                        last_addr: "2001:db8:ffff:ffff:ffff:ffff:ffff:ffff"
                        total_addresses: "79228162514264337593543950336"
        "400": { description: Invalid request, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /range/ipv4:
    post:
      operationId: rangeToIPv4CIDRs
      tags: [Range]
      summary: Convert an IPv4 address range to its minimal covering CIDR list
      description: |
        Accepts a start IP and end IP (both inclusive) and returns the minimal list of
        CIDRs that exactly covers the range using a greedy largest-aligned block algorithm.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start, end]
              properties:
                start:
                  type: string
                  description: Start IPv4 address (inclusive)
                  example: "10.0.0.0"
                end:
                  type: string
                  description: End IPv4 address (inclusive)
                  example: "10.0.0.255"
      responses:
        "200":
          description: List of covering CIDRs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [cidrs]
                        properties:
                          cidrs:
                            type: array
                            items: { type: string }
                            example: ["10.0.0.0/24"]
              example:
                ok: true
                data:
                  cidrs:
                    - "10.0.0.0/24"
        "400": { description: Invalid IPs or end < start, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /tree:
    post:
      operationId: buildSubnetTree
      tags: [Tree]
      summary: Build a subnet allocation tree from a parent CIDR and child allocations
      description: |
        Accepts a parent CIDR and an array of allocated child CIDRs and returns a
        containment tree showing how the children nest within the parent, including
        unallocated gap CIDRs between allocated blocks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [parent, children]
              properties:
                parent:
                  type: string
                  description: Parent IPv4 CIDR
                  example: "10.0.0.0/24"
                children:
                  type: array
                  description: Allocated child CIDRs (must all be contained within parent)
                  maxItems: 100
                  items: { type: string }
                  example: ["10.0.0.0/26", "10.0.0.128/26"]
      responses:
        "200":
          description: Subnet allocation tree
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [tree]
                        properties:
                          tree:
                            type: object
                            description: Root tree node
                            required: [cidr, allocated, children]
                            properties:
                              cidr:      { type: string }
                              allocated: { type: boolean }
                              children:
                                type: array
                                items: { type: object }
                              gaps:
                                type: array
                                description: Unallocated CIDR blocks within this node
                                items: { type: string }
              example:
                ok: true
                data:
                  tree:
                    cidr: "10.0.0.0/24"
                    allocated: false
                    children:
                      - cidr: "10.0.0.0/26"
                        allocated: true
                        children: []
                      - cidr: "10.0.0.64/26"
                        allocated: false
                        children: []
                      - cidr: "10.0.0.128/26"
                        allocated: true
                        children: []
                      - cidr: "10.0.0.192/26"
                        allocated: false
                        children: []
        "400": { description: Invalid CIDRs or children outside parent, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint disabled by $api_allowed_endpoints configuration, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }

  /changelog:
    get:
      operationId: getChangelog
      tags: [Changelog]
      summary: Get CHANGELOG.md contents
      description: Returns the full CHANGELOG.md as a Markdown string.
      responses:
        "200":
          description: Changelog contents
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          changelog: { type: string, description: "Full CHANGELOG.md contents" }
              example:
                ok: true
                data:
                  changelog: "## [2.6.0] - 2026-04-21\n### Added\n- ..."
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "404": { description: Endpoint not in allowlist, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "429": { description: Rate limit exceeded, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "503": { description: Changelog file not available on this server, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
