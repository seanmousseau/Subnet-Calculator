<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }

  /* favicon-32 — network hierarchy, 32×32, transparent bg */
  #favicon-32 {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
  }

  /* apple-touch-icon — SC in rounded square, 180×180 */
  #apple-touch {
    width: 180px; height: 180px;
    background: #0d1117;
    border-radius: 40px;
    display: flex; align-items: center; justify-content: center;
  }

  /* main logo — SC in rounded square, 512×512 */
  #logo-main {
    width: 512px; height: 512px;
    background: #0d1117;
    border-radius: 112px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<!-- Favicon 32×32 — network hierarchy paths, no font needed -->
<div id="favicon-32">
  <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="12" y="2"  width="24" height="14" rx="3" fill="#06d6a0"/>
    <line x1="24" y1="16" x2="24" y2="22" stroke="#06d6a0" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="22" x2="10" y2="22" stroke="#06d6a0" stroke-width="3" stroke-linecap="round"/>
    <line x1="24" y1="22" x2="38" y2="22" stroke="#06d6a0" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="10" y2="28" stroke="#06d6a0" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="22" x2="38" y2="28" stroke="#06d6a0" stroke-width="3" stroke-linecap="round"/>
    <rect x="2"  y="28" width="16" height="14" rx="3" fill="#06d6a0"/>
    <rect x="30" y="28" width="16" height="14" rx="3" fill="#06d6a0"/>
  </svg>
</div>

<!-- Apple Touch Icon 180×180 — SC on dark rounded square -->
<div id="apple-touch">
  <span style="font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:88px;color:#06d6a0;letter-spacing:-4px;line-height:1">SC</span>
</div>

<!-- Main logo 512×512 — SC on dark rounded square -->
<div id="logo-main">
  <span style="font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:248px;color:#06d6a0;letter-spacing:-10px;line-height:1">SC</span>
</div>

</body>
</html>
